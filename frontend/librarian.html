<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar">

        <h3 style="margin-left:3vw;">Welcome To LIBRARYTECH</h3>

        <div class="profile">

            <div class="avatar">L</div>

            <h4>Librarian</h4>

        </div>

        <ul>

            <li onclick="scrollToSection('booksSection')">
                Books
            </li>

            <li onclick="scrollToSection('studentsSection')">
                Students
            </li>

            <li>Account</li>

            <li>Service</li>

        </ul>

        <button class="logout-btn" onclick="logout()">

            Logout

        </button>

    </div>



    <!-- ================= MAIN ================= -->

    <div class="main-content">



        <!-- ================= BOOK SECTION ================= -->

        <section id="booksSection" class="section">

            <h2 style="margin-bottom:2px;">

                Library Books

            </h2>


            <div class="top-bar">

                <input

                    id="bookSearchInput"

                    type="text"

                    placeholder="Search books..."

                >

                <button onclick="searchBooks()">

                    Search

                </button>

            </div>



            <!-- ADD BOOK -->

            <div class="add-book-section">

                <h3>Add New Book</h3>

                <div class="add-book-form">

                    <input

                        id="newTitle"

                        placeholder="Book Title"

                    >

                    <input

                        id="newAuthor"

                        placeholder="Author Name"

                    >

                    <input

                        id="newQty"

                        type="number"

                        placeholder="Available Copies"

                    >

                    <input

                        id="newImg"

                        placeholder="Image URL"

                    >

                    <button onclick="addBook()">

                        Add Book

                    </button>

                </div>

            </div>



            <div

                id="booksGrid"

                class="books-grid"

            ></div>

        </section>





        <!-- ================= STUDENTS ================= -->

        <section

            id="studentsSection"

            class="section"

        >

            <h2 style="margin-bottom:2px;">

                Student Records

            </h2>



            <div class="top-bar">

                <input

                    id="studentSearchInput"

                    placeholder="Search student..."

                >

                <button onclick="searchStudents()">

                    Search

                </button>

            </div>



            <div

                id="studentsContainer"

            >

            </div>

        </section>





        <!-- ================= FOOTER ================= -->

        <footer>

            <p>

                © 2026 University Library Management System

            </p>

            <p>

                LibraryTech

            </p>

            <p>

                Designed by Anurima Sarkar

            </p>

        </footer>

    </div>

</div>
<script>

const API = "http://localhost:5000/api";

let books = [];
let transactions = [];


/* ===============================
        PAGE LOAD
================================ */

window.onload = async () => {

    try {

        await loadBooks();

        await loadStudents();

    }

    catch (err) {

        console.error(err);

    }

};


/* ===============================
      SIDEBAR NAVIGATION
================================ */

function scrollToSection(id) {

    document
        .getElementById(id)
        .scrollIntoView({

            behavior: "smooth"

        });

}


/* ===============================
          LOGOUT
================================ */

function logout() {

    localStorage.removeItem("token");

    localStorage.removeItem("studentId");

    localStorage.removeItem("role");

    localStorage.removeItem("name");

    window.location.href = "index.html";

}


/* ===============================
      SEARCH STUDENTS
================================ */

function searchStudents() {

    const text = document
        .getElementById("studentSearchInput")
        .value
        .toLowerCase();

    const cards = document.querySelectorAll(".student-card");

    cards.forEach(card => {

        const name = card
            .querySelector("h3")
            .innerText
            .toLowerCase();

        card.style.display =

            name.includes(text)

                ? "block"

                : "none";

    });

}

</script>
<script>

/* ======================================
            LOAD BOOKS
====================================== */

async function loadBooks() {

    try {

        const res = await fetch(`${API}/books`);

        books = await res.json();

        renderBooks();

    }

    catch (err) {

        console.error(err);

        alert("Unable to load books.");

    }

}


/* ======================================
           RENDER BOOKS
====================================== */

function renderBooks(list = books) {

    const grid = document.getElementById("booksGrid");

    grid.innerHTML = "";

    list.forEach(book => {

        grid.innerHTML += `

        <div class="book-card admin-card">

            <img src="${book.image || 'https://via.placeholder.com/200x250?text=Book'}">

            <h4>${book.title}</h4>

            <p>${book.author}</p>

            <p>

                <strong>Available :</strong>

                <span id="qty-${book._id}">

                    ${book.availableCopies}

                </span>

            </p>

            <div class="admin-buttons">

                <button onclick="increaseQty('${book._id}')">

                    +

                </button>

                <button onclick="decreaseQty('${book._id}')">

                    -

                </button>

                <button onclick="saveBook('${book._id}')">

                    Save

                </button>

            </div>

        </div>

        `;

    });

}


/* ======================================
        SEARCH BOOK
====================================== */

function searchBooks() {

    const text =

        document

        .getElementById("bookSearchInput")

        .value

        .toLowerCase();

    const filtered = books.filter(book =>

        book.title.toLowerCase().includes(text)

        ||

        book.author.toLowerCase().includes(text)

    );

    renderBooks(filtered);

}


/* ======================================
       INCREASE COPIES
====================================== */

function increaseQty(id) {

    const book = books.find(b => b._id === id);

    if (book) {

        book.availableCopies++;

        renderBooks();

    }

}


/* ======================================
       DECREASE COPIES
====================================== */

function decreaseQty(id) {

    const book = books.find(b => b._id === id);

    if (book && book.availableCopies > 0) {

        book.availableCopies--;

        renderBooks();

    }

}


/* ======================================
        SAVE BOOK
====================================== */

async function saveBook(id) {

    const book = books.find(b => b._id === id);

    try {

        const res = await fetch(

            `${API}/books/${id}`,

            {

                method: "PUT",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    availableCopies: book.availableCopies

                })

            }

        );

        if (res.ok) {

            alert("Book updated successfully.");

            await loadBooks();

        }

        else {

            alert("Unable to update book.");

        }

    }

    catch (err) {

        console.error(err);

    }

}


/* ======================================
          ADD BOOK
====================================== */

async function addBook() {

    const title = document.getElementById("newTitle").value.trim();

    const author = document.getElementById("newAuthor").value.trim();

    const qty = document.getElementById("newQty").value;

    const image = document.getElementById("newImg").value.trim();

    if (!title || !author || !qty) {

        alert("Please fill all fields.");

        return;

    }

    try {

        const res = await fetch(

            `${API}/books/add`,

            {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    title,

                    author,

                    availableCopies: Number(qty),

                    image

                })

            }

        );

        if (res.ok) {

            alert("Book added successfully.");

            document.getElementById("newTitle").value = "";

            document.getElementById("newAuthor").value = "";

            document.getElementById("newQty").value = "";

            document.getElementById("newImg").value = "";

            await loadBooks();

        }

        else {

            alert("Unable to add book.");

        }

    }

    catch (err) {

        console.error(err);

        alert("Server Error");

    }

}

</script>
<script>

/* =====================================
          LOAD STUDENTS
===================================== */

async function loadStudents(){

    try{

        const res = await fetch(`${API}/transactions`);

        transactions = await res.json();

        renderStudents();

    }

    catch(err){

        console.error(err);

    }

}


/* =====================================
         RENDER STUDENTS
===================================== */

function renderStudents(){

    const container = document.getElementById("studentsContainer");

    container.innerHTML="";

    const grouped={};

     transactions.forEach(record => {

    if (!record.student || !record.book) return;

    const id = record.student._id;

    if (!grouped[id]) {

        grouped[id] = {

            name: record.student.name,

            email: record.student.email,

            books: []

        };

    }

    grouped[id].books.push(record);

});

    Object.values(grouped).forEach(student=>{

        let html=`

        <div class="student-card">

            <div class="student-header">

                <div>

                    <h3>${student.name}</h3>

                    <p class="student-email">

                        ${student.email}

                    </p>

                </div>

                <span class="book-count">

                    ${student.books.length} Books

                </span>

            </div>

        `;

        student.books.forEach(record=>{

            html+=`

            <div class="transaction-row">

                <span>

                    ${record.book ? record.book.title : "Book Deleted"}

                </span>

            `;

            if(record.status==="issued"){

                html+=`

                <button onclick="imposeFine('${record._id}')">

                    Impose Fine

                </button>

                `;

            }

            html+=`

                <span class="status ${record.status}">

                    ${record.status}

                </span>

            </div>

            `;

            if(record.fine>0){

                html+=`

                <p style="color:#f59e0b;margin-top:6px;">

                    Fine : ₹${record.fine}

                    (${record.finePaid?"Paid":"Pending"})

                </p>

                `;

            }

        });

        html+="</div>";

        container.innerHTML+=html;

    });

}


/* =====================================
         IMPOSE FINE
===================================== */

async function imposeFine(transactionId){

    const amount = prompt(

        "Enter Fine Amount"

    );

    if(!amount) return;

    try{

        const res = await fetch(

            `${API}/transactions/fine`,

            {

                method:"POST",

                headers:{

                    "Content-Type":"application/json"

                },

                body:JSON.stringify({

                    transactionId,

                    fineAmount:Number(amount)

                })

            }

        );

        const data = await res.json();

        alert(data.message);

        await loadStudents();

    }

    catch(err){

        console.error(err);

        alert("Unable to impose fine.");

    }

}

</script>
</body>
</html>
