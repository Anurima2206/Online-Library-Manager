<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <h3 style="margin-left:3vw;">Welcome To LIBRARYTECH</h3>

        <div class="profile">
            <div class="avatar">S</div>
            <h4 id="studentName">Student</h4>
        </div>

        <ul>
            <li onclick="scrollToSection('searchSection')">Search Books</li>
            <li onclick="scrollToSection('transactionSection')">My Transactions</li>
            <li>Account</li>
            <li>Service</li>
        </ul>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Search Books -->

        <section id="searchSection" class="section">

            <div class="top-bar">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search Books..."
                >

                <button onclick="searchBooks()">Search</button>

            </div>

            <div
                class="books-grid"
                id="booksGrid">
            </div>

        </section>



        <!-- Transactions -->

        <section
            id="transactionSection"
            class="section">

            <h2>My Transactions</h2>

            <h3
            style="color:red;margin-bottom:8px;">

                All issued books must be returned
                within 7 days.

            </h3>

            <div id="transactionList">

            </div>

        </section>


        <footer>

            <p>
                © 2026 University Library
            </p>

            <p>
                LibraryTech
            </p>

            <p>
                Designed by Anurima Sarkar
            </p>

        </footer>

    </div>

</div>

<script>

const API="http://localhost:5000/api";

let books=[];

let transactions=[];

const studentId=
localStorage.getItem("studentId");



window.onload=async()=>{

    await loadBooks();

    await loadTransactions();

};

async function loadBooks(){

    try{

        const res=
        await fetch(`${API}/books`);

        books=await res.json();

        renderBooks();

    }

    catch(err){

        console.log(err);

    }

}

async function loadTransactions(){

    try{

        const res=
        await fetch(
`${API}/transactions/student/${studentId}`
        );

        transactions=
        await res.json();

        renderTransactions();

    }

    catch(err){

        console.log(err);

    }

}

function renderBooks(list=books){

    const grid=
    document.getElementById("booksGrid");

    grid.innerHTML="";



    list.forEach(book=>{

        grid.innerHTML+=`

        <div class="book-card">

            <img
            src="${
                book.image ||
"https://via.placeholder.com/180x250"
            }">

            <h4>${book.title}</h4>

            <p>${book.author}</p>

            <p>

                Available :
                ${book.availableCopies}

            </p>

            ${
                book.availableCopies>0 ?

                `<button
                onclick="issueBook('${book._id}')">
                Issue
                </button>`

                :

                `<button
                class="disabled">
                Not Available
                </button>`
            }

        </div>

        `;

    });
    
}
async function issueBook(bookId){

    try{

        const res = await fetch(`${API}/transactions/issue`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                studentId:studentId,

                bookId:bookId

            })

        });

        const data = await res.json();

        if(!res.ok){

            alert(data.message);

            return;

        }

        alert("Book Issued Successfully!");

        await loadBooks();

        await loadTransactions();

    }

    catch(err){

        console.log(err);

    }

}

async function returnBook(transactionId){

    try{

        const res = await fetch(`${API}/transactions/return`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                transactionId:transactionId

            })

        });

        const data = await res.json();

        if(!res.ok){

            alert(data.message);

            return;

        }

        alert("Book Returned Successfully!");

        await loadBooks();

        await loadTransactions();

    }

    catch(err){

        console.log(err);

    }

}

function renderTransactions(){

    const container =
    document.getElementById("transactionList");

    container.innerHTML="";

    if(transactions.length===0){

        container.innerHTML=
        "<h3>No Transactions Found</h3>";

        return;

    }

    transactions.forEach(txn=>{

        container.innerHTML+=`

        <div class="transaction-card">

            <h3>${txn.book.title}</h3>

            <p>

                Status :

                <b>

                ${
                    txn.status==="issued"
                    ?"Issued"
                    :"Returned"
                }

                </b>

            </p>

            <p>

                Issue Date :

                ${new Date(txn.issueDate)
                    .toLocaleDateString()}

            </p>

            <p>

                Fine :

                ₹${txn.fine || 0}

            </p>

            <p>

                Fine Status :

                ${
                    txn.finePaid
                    ?"<span style='color:green;'>Paid</span>"
                    :"<span style='color:red;'>Pending</span>"
                }

            </p>

            ${
                txn.status==="issued"

                ?

                `<button
                onclick="returnBook('${txn._id}')">

                Return Book

                </button>`

                :

                `<button disabled>

                Returned

                </button>`

            }

        </div>

        `;

    });

}

function searchBooks(){

    const value =
    document
    .getElementById("searchInput")
    .value
    .toLowerCase();

    const filtered =
    books.filter(book=>

        book.title
        .toLowerCase()
        .includes(value)

        ||

        book.author
        .toLowerCase()
        .includes(value)

    );

    renderBooks(filtered);

}

function scrollToSection(id){

    document
    .getElementById(id)
    .scrollIntoView({

        behavior:"smooth"

    });

}

function logout(){

    localStorage.clear();

    window.location.href="index.html";

}

</script>

</body>

</html>
